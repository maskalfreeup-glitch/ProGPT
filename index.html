<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PROGPT // SOVEREIGN_SIGNAL_NODE</title>

<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@300;400;700&family=Anybody:wght@900&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#050505; --card:#0a0a0a; --acid:#00ff88;
  --text:#eef1fa; --dim:#555; --border:rgba(0,255,136,0.15);
}

body{ margin:0; background:var(--bg); color:var(--text);
  font-family:'Azeret Mono', monospace; overflow-x:hidden; }

.status-bar{
  position:fixed; top:0; width:100%;
  background:rgba(0,0,0,0.9);
  border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between;
  padding:12px 25px; font-size:10px; z-index:100;
}

.active-node{ color:var(--acid); font-weight:bold; }

.hero{
  min-height:100vh; display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  text-align:center; padding:120px 20px 60px;
}

h1{
  font-family:'Anybody'; font-size:clamp(3rem,10vw,7rem);
  line-height:0.85; margin:0; text-transform:uppercase;
}

.highlight{ color:var(--acid); }

.protocol-sub{ margin-top:20px; color:var(--dim); max-width:500px; }

.ingestion-module{
  margin-top:40px; background:var(--card);
  border:1px solid var(--border);
  padding:30px; width:100%; max-width:420px;
}

input, select{
  width:100%; padding:14px; margin-bottom:12px;
  background:#000; border:1px solid #1a1a1a;
  color:var(--text);
}

input:focus{ border-color:var(--acid); outline:none; }

.execute-btn{
  width:100%; padding:16px;
  background:var(--acid); color:#000;
  border:none; font-weight:900; cursor:pointer;
}

.whop-bridge{
  display:block; margin-top:12px;
  padding:12px; text-decoration:none;
  color:#8ea1ff; border:1px solid rgba(88,101,242,0.3);
}

footer{ text-align:center; font-size:9px; padding:30px; color:#222; }
</style>
</head>

<body>

<div class="status-bar">
  <span>PROGPT_NODE</span>
  <span class="active-node">187 BUILDERS ACTIVE</span>
  <a href="https://whop.com/progpt" style="color:var(--acid)">ENTER</a>
</div>

<section class="hero">

<h1>RECLAIM<br><span class="highlight">SIGNAL</span></h1>

<p class="protocol-sub">
Free audit: traffic leaks, SEO gaps, monetization opportunities in 24h.
</p>

<div class="ingestion-module">

<form id="form">

<!-- HONEYPOT -->
<input type="text" id="company" style="display:none">

<input type="text" id="name" placeholder="PROJECT NAME" required>
<input type="url" id="url" placeholder="https://your-site.com" required>
<input type="email" id="email" placeholder="EMAIL" required>

<select id="cat">
<option value="">OPTIONAL: SECTOR</option>
<option>SAAS</option>
<option>ECOMMERCE</option>
</select>

<button class="execute-btn">GET AUDIT</button>

</form>

<a href="https://whop.com/progpt" class="whop-bridge">
JOIN DISCORD →
</a>

</div>
</section>

<footer>CLOUDFLARE // N8N // SOLO ENGINE</footer>

<script>
const savedEmail = localStorage.getItem('email');
if(savedEmail){
  document.getElementById('email').value = savedEmail;
}

document.getElementById('form').addEventListener('submit', async function(e){
  e.preventDefault();

  if(document.getElementById('company').value){
    return;
  }

  const btn = this.querySelector('button');

  const payload = {
    name: name.value,
    url: url.value,
    email: email.value,
    cat: cat.value,
    time: new Date().toISOString()
  };

  localStorage.setItem('email', payload.email);

  btn.textContent = "PROCESSING...";

  try{
    await fetch("https://YOUR-N8N-WEBHOOK", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify(payload)
    });
  }catch(err){}

  btn.textContent = "REDIRECTING...";

  setTimeout(()=>{
    window.location.href = "https://whop.com/progpt";
  }, 900);
});
</script>

</body>
</html>
